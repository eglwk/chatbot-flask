<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatBot Rose</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
    }

    .chat-container {
      width: 400px;
      height: 600px;
      margin: 50px auto;
      border: 1px solid #ddd;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      background: #fff;
      position: relative;
      overflow: hidden;
    }

    .chat-header {
      background-color: #666;
      color: #fff;
      padding: 0 15px;
      height: 60px;
      display: flex;
      align-items: center;
      font-size: 18px;
      font-weight: bold;
      gap: 10px;
      flex-shrink: 0;
    }

    .chat-header img {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
    }

    .close-button {
      position: absolute;
      top: 15px;
      right: 15px;
      background-color: transparent;
      color: #fff;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      scrollbar-width: thin;
      scrollbar-color: #888 #f1f1f1;
    }

    .bot-message-container {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .bot-name {
      font-weight: bold;
      margin-top: 10px;
      min-width: 40px;
    }

    .bot-message {
      background-color: #f1f1f1;
      padding: 10px 15px;
      border-radius: 15px;
      max-width: 70%;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message {
      display: flex;
      align-items: flex-start;
    }

    .user-message {
      align-self: flex-end;
      background-color: #007bff;
      color: #fff;
      padding: 10px 15px;
      border-radius: 15px;
      max-width: 70%;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .typing-message {
      font-style: italic;
      color: #666;
    }

    .input-container {
      display: flex;
      align-items: flex-end;
      padding: 10px;
      border-top: 1px solid #e0e0e0;
      background-color: #fff;
      gap: 10px;
      flex-shrink: 0;
    }

    .input-field {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 15px;
      font-size: 16px;
      font-family: Arial, sans-serif;
      resize: none;
      min-height: 50px;
      max-height: 140px;
      overflow-y: auto;
      transition: height 0.2s ease;
      box-sizing: border-box;
    }

    .send-button {
      background-color: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      transition: background-color 0.2s ease;
      flex-shrink: 0;
    }

    .send-button svg {
      fill: #333;
    }

    .send-button:hover {
      background-color: #d1d1d1;
    }

    .send-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>

  <script>
document.addEventListener("DOMContentLoaded", () => {
  const messagesContainer = document.querySelector(".chat-messages");
  const inputField = document.querySelector(".input-field");
  const sendButton = document.querySelector(".send-button");

  let isSending = false;
  let typingIndicator = null;

  function scrollToBottom() {
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  function addUserMessage(text) {
    const el = document.createElement("div");
    el.classList.add("message", "user-message");
    el.textContent = text;
    messagesContainer.appendChild(el);
    scrollToBottom();
  }

  function addBotMessage(text) {
    const el = document.createElement("div");
    el.classList.add("bot-message-container");

    el.innerHTML = `
      <div class="bot-name">Chatti:</div>
      <div class="bot-message">${escapeHtml(text)}</div>
    `;

    messagesContainer.appendChild(el);
    scrollToBottom();
  }

  function showTypingIndicator() {
    removeTypingIndicator();

    typingIndicator = document.createElement("div");
    typingIndicator.classList.add("bot-message-container");

    typingIndicator.innerHTML = `
      <div class="bot-name">Chatti:</div>
      <div class="bot-message typing-message">schreibt ...</div>
    `;

    messagesContainer.appendChild(typingIndicator);
    scrollToBottom();
  }

  function removeTypingIndicator() {
    if (typingIndicator) {
      typingIndicator.remove();
      typingIndicator = null;
    }
  }

  async function loadChat() {
    try {
      const response = await fetch("/load_chat");
      const data = await response.json();

      messagesContainer.innerHTML = "";

      if (data.chat_history && data.chat_history.length > 0) {
        data.chat_history.forEach(msg => {
          if (msg.role === "user") {
            addUserMessage(msg.content);
          } else if (msg.role === "assistant") {
            addBotMessage(msg.content);
          }
        });
      } else {
        addBotMessage("Hallo! Schön, dass du da bist. Womit kann ich dir helfen?");
      }

    } catch (error) {
      console.error(error);
      addBotMessage("Chat konnte nicht geladen werden.");
    }
  }

  async function sendMessage() {
    const userMessage = inputField.value.trim();

    if (userMessage === "" || isSending) return;

    isSending = true;
    sendButton.disabled = true;
    inputField.disabled = true;

    addUserMessage(userMessage);
    inputField.value = "";
    inputField.style.height = "auto";

    showTypingIndicator();

    try {
      const response = await fetch("/send", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: userMessage
        })
      });

      const data = await response.json();
      removeTypingIndicator();

      if (!response.ok) {
        addBotMessage(data.error || "Serverfehler.");
      } else {
        addBotMessage(data.reply);
      }

    } catch (error) {
      removeTypingIndicator();
      addBotMessage("Verbindung fehlgeschlagen.");
      console.error(error);
    } finally {
      isSending = false;
      sendButton.disabled = false;
      inputField.disabled = false;
      inputField.focus();
    }
  }

  sendButton.addEventListener("click", sendMessage);

  inputField.addEventListener("keydown", (event) => {
    if (event.key === "Enter" && !event.shiftKey) {
      event.preventDefault();
      sendMessage();
    }
  });

  inputField.addEventListener("input", () => {
    inputField.style.height = "auto";
    inputField.style.height = inputField.scrollHeight + "px";
  });

  // Beim Start Chat laden
  loadChat();
});
</script>
</head>

<body>
  <div class="chat-container">
    <div class="chat-header">
    <img src="/static/chattiHFI.png" alt="Chatti">      
    Chatti
      <button class="close-button" type="button" onclick="window.location.reload()">×</button>
    </div>

    <div class="chat-messages"></div>

    <div class="input-container">
      <textarea
        class="input-field"
        placeholder="Schreibe hier deine Nachricht..."
        rows="1"
      ></textarea>

      <button class="send-button" type="button" aria-label="Nachricht senden">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
          <path d="M2 2L22 12L2 22V16L16 12L2 8V2Z" />
        </svg>
      </button>
    </div>
  </div>
</body>
</html>
