<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>{{ title or "Chatbot" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div>
        {% for message in messages %}
          <p>{{ message }}</p>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</body>
</html>
