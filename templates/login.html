{% extends "base.html" %}
{% block content %}
  <h1>Login</h1>

  <form method="post">
    <label for="username">Benutzername</label><br>
    <input
      type="text"
      id="username"
      name="username"
      value="{{ prefill_username }}"
      required
    ><br><br>

    <label for="password">Passwort</label><br>
    <input type="password" id="password" name="password" required><br><br>

    <button type="submit">Einloggen</button>
  </form>
{% endblock %}
