{% extends "base.html" %}
{% block content %}
  <h1>Passwort festlegen</h1>
  <p>Ihr Benutzername lautet: <strong>{{ username }}</strong></p>
  <p>Bitte legen Sie jetzt Ihr Passwort fest.</p>

  <form method="post">
    <label for="password">Passwort</label><br>
    <input type="password" id="password" name="password" required><br><br>

    <label for="password_repeat">Passwort wiederholen</label><br>
    <input type="password" id="password_repeat" name="password_repeat" required><br><br>

    <button type="submit">Passwort speichern</button>
  </form>
{% endblock %}
